basePath: /
definitions:
  handler.bulkUserIDsSwagger:
    properties:
      userIds:
        items:
          type: integer
        type: array
    type: object
  handler.bulkUsersSwagger:
    properties:
      data:
        items:
          $ref: '#/definitions/usecase.UserResponse'
        type: array
    type: object
  handler.listUsersSwagger:
    properties:
      data:
        items:
          $ref: '#/definitions/usecase.UserResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
    type: object
  handler.messageSwagger:
    properties:
      message:
        type: string
    type: object
  handler.registerCreatedSwagger:
    properties:
      message:
        type: string
      user:
        $ref: '#/definitions/usecase.UserResponse'
    type: object
  handler.simpleErrJSON:
    properties:
      error:
        type: string
    type: object
  usecase.ImportUserError:
    properties:
      email:
        type: string
      message:
        type: string
      rowNumber:
        type: integer
    type: object
  usecase.ImportUsersResponse:
    properties:
      errors:
        items:
          $ref: '#/definitions/usecase.ImportUserError'
        type: array
      errorsTruncated:
        type: boolean
      failed:
        type: integer
      success:
        type: integer
    type: object
  usecase.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  usecase.LoginResponse:
    properties:
      accessToken:
        type: string
      expiresAt:
        type: string
      user:
        $ref: '#/definitions/usecase.UserResponse'
    type: object
  usecase.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      role:
        enum:
        - manager
        - member
        type: string
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  usecase.ResendVerificationRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  usecase.UserResponse:
    properties:
      createdAt:
        type: string
      email:
        type: string
      isVerified:
        type: boolean
      role:
        type: string
      updatedAt:
        type: string
      userId:
        type: integer
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: Seta Golang Intern Project
  description: 'JWT authentication, session revocation, user APIs, and CSV bulk user
    import for managers. Authorization header: Bearer followed by JWT.'
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Auth & User Management Service API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/usecase.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
      summary: Login
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.messageSwagger'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/usecase.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.registerCreatedSwagger'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
      summary: Register
      tags:
      - auth
  /api/v1/auth/resend-verification:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/usecase.ResendVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.messageSwagger'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
      summary: Resend verification email
      tags:
      - auth
  /api/v1/auth/verify-email:
    get:
      parameters:
      - description: Verification token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.messageSwagger'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
      summary: Verify email
      tags:
      - auth
  /api/v1/import-users:
    post:
      consumes:
      - multipart/form-data
      description: 'Multipart form field "file": comma-separated CSV with header row
        (username,email,password and optional role). Max upload size 3MB. Worker pool
        size from IMPORT_WORKERS env (default 5).'
      parameters:
      - description: CSV file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.ImportUsersResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
      security:
      - BearerAuth: []
      summary: Bulk import users from CSV
      tags:
      - users
  /api/v1/users:
    get:
      parameters:
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.listUsersSwagger'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - users
  /api/v1/users/bulk:
    post:
      consumes:
      - application/json
      parameters:
      - description: User IDs
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.bulkUserIDsSwagger'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.bulkUsersSwagger'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
      security:
      - BearerAuth: []
      summary: Bulk get users
      tags:
      - users
  /api/v1/users/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.simpleErrJSON'
      security:
      - BearerAuth: []
      summary: Current user
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: JWT from POST /api/v1/auth/login
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
